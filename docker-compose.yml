services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce-db
    restart: unless-stopped
    env_file:
      - ./services/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./services/.env
    command: >
      sh -c "export DATABASE_URL=postgresql://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB &&
      npx prisma migrate deploy &&
      npx prisma db seed &&
      node index.js"
    ports:
      - "3000:3000"

  views:
    build:
      context: ./views
      dockerfile: Dockerfile
    container_name: ecommerce-views
    restart: unless-stopped
    env_file:
      - ./views/.env
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data: